<!DOCTYPE html>
<html>
<head>

<title>About - Mayandi Raja V</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

<style>

/* PARTICLE BACKGROUND */

#particles-js{
position:fixed;
width:100%;
height:100%;
top:0;
left:0;
z-index:-1;
background:#020617;
}

/* ABOUT SECTION */

.about-container{
display:flex;
flex-wrap:wrap;
align-items:center;
justify-content:center;
gap:40px;
margin-top:40px;
}

.about-text{
max-width:500px;
}

.about-text h2{
margin-bottom:15px;
font-size:32px;
color:#38bdf8;
}

.about-text p{
line-height:1.6;
font-size:17px;
}

/* INFO CARDS */

.about-cards{
display:flex;
flex-wrap:wrap;
gap:20px;
margin-top:30px;
}

.card{
flex:1 1 150px;
padding:20px;
border-radius:12px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(10px);
border:1px solid rgba(255,255,255,0.2);
text-align:center;
transition:all 0.4s ease;
cursor:pointer;
}

.card i{
font-size:28px;
color:#38bdf8;
margin-bottom:10px;
transition:0.3s;
}

.card:hover{
transform:translateY(-12px) scale(1.05);
box-shadow:0 10px 25px rgba(56,189,248,0.4);
}

.card:hover i{
transform:scale(1.2);
color:#22c55e;
}

/* TERMINAL STYLE */

#terminal{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(12px);
padding:20px;
font-family:monospace;
border-radius:12px;
margin-top:20px;
border:1px solid rgba(255,255,255,0.2);
font-size:16px;

/* animated gradient text */

background-image:linear-gradient(
90deg,
#38bdf8,
#22c55e,
#a855f7,
#38bdf8
);

background-size:300%;

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

animation:textGlow 6s linear infinite;
}

@keyframes textGlow{
0%{background-position:0%}
100%{background-position:300%}
}

/* PROFILE IMAGE */

.about-img{
width:220px;
height:220px;
border-radius:50%;
padding:6px;
display:flex;
align-items:center;
justify-content:center;

background:linear-gradient(
45deg,
#38bdf8,
#22c55e,
#a855f7,
#38bdf8
);

background-size:300%;
animation:borderMove 6s linear infinite;
}

.about-img img{
width:100%;
height:100%;
border-radius:50%;
object-fit:cover;
display:block;
}

@keyframes borderMove{
0%{background-position:0%}
100%{background-position:300%}
}

</style>

</head>

<body>

<div id="particles-js"></div>

<header>

<div class="logo">Mayandi Raja</div>

<nav>
<a href="index.html">Home</a>
<a href="about.html">About</a>
<a href="skills.html">Skills</a>
<a href="contact.html">Contact</a>
</nav>

</header>

<section class="glass">

<div class="about-container" data-aos="fade-up">

<div class="about-img">
<img src="profile.png">
</div>

<div class="about-text">

<h2>About Me</h2>

<div id="terminal"></div>

<div class="about-cards">

<div class="card" data-aos="fade-up">
<i class="fa-solid fa-graduation-cap"></i>
<h4>Education</h4>
<p>Computer Technology (AI & Data Science)</p>
</div>

<div class="card" data-aos="fade-up" data-aos-delay="200">
<i class="fa-solid fa-code"></i>
<h4>Developer</h4>
<p>Web Developer & Java Programmer</p>
</div>

<div class="card" data-aos="fade-up" data-aos-delay="400">
<i class="fa-solid fa-lightbulb"></i>
<h4>Goal</h4>
<p>Become a Software Engineer</p>
</div>

</div>

</div>

</div>

</section>

<script src="https://cdn.jsdelivr.net/npm/particles.js"></script>
<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>

<script>

AOS.init();

/* TERMINAL TEXT */

const text="My name is Mayandi Raja. I am a Computer Technology specialized Artificial Intelligence and Data Science student with a strong interest in programming and web development. I enjoy learning new technologies and building creative projects that improve my technical skills.";

let i=0;

function type(){
if(i<text.length){
document.getElementById("terminal").innerHTML+=text.charAt(i);
i++;
setTimeout(type,40);
}
}

type();

/* PARTICLES */

particlesJS("particles-js",{
particles:{number:{value:80},size:{value:3}},
interactivity:{events:{onhover:{enable:true,mode:"repulse"}}}
});

</script>

</body>
</html>
