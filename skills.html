
<!DOCTYPE html>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

<style>

/* BACKGROUND */

body{
background:#020617;
color:white;
font-family:Arial;
cursor:none;
}

/* AI CURSOR */

.cursor{
width:20px;
height:20px;
border:2px solid #38bdf8;
border-radius:50%;
position:fixed;
pointer-events:none;
transform:translate(-50%,-50%);
box-shadow:0 0 15px #38bdf8;
}

/* SECTION */

section{
max-width:1100px;
margin:auto;
padding:40px;
}

h2{
text-align:center;
color:#38bdf8;
margin-bottom:30px;
}

/* FILTER BUTTONS */

.filters{
text-align:center;
margin-bottom:40px;
}

.filters button{
margin:5px;
padding:10px 20px;
border:none;
background:#1e293b;
color:white;
cursor:pointer;
border-radius:6px;
transition:0.3s;
}

.filters button:hover{
background:#38bdf8;
}

/* GRID */

.skills-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:30px;
}

/* CARD */

.skill-card{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(10px);
border-radius:12px;
padding:25px;
text-align:center;
border:1px solid rgba(255,255,255,0.2);
transition:0.4s;
transform-style:preserve-3d;
}

.skill-card:hover{
transform:rotateY(15deg) rotateX(10deg);
box-shadow:0 0 20px #38bdf8;
}

/* ICON */

.skill-card i{
font-size:35px;
color:#38bdf8;
margin-bottom:10px;
}

/* CIRCLE */

.circle{
width:110px;
height:110px;
border-radius:50%;
background:conic-gradient(#38bdf8 0%,#1e293b 0%);
display:flex;
align-items:center;
justify-content:center;
margin:auto;
margin-top:15px;
}

.circle span{
background:#020617;
width:80px;
height:80px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:14px;
}

</style>

</head>

<body>

<script>

/* FILTER */

function filterSkills(category){

let cards=document.querySelectorAll(".skill-card");

cards.forEach(card=>{

if(category==="all" || card.classList.contains(category)){
card.style.display="block";
}else{
card.style.display="none";
}

});

}

/* ANIMATED PERCENTAGE */

document.querySelectorAll(".skill-card").forEach(card=>{

let percent=card.getAttribute("data-percent");
let circle=card.querySelector(".circle");
let text=card.querySelector("span");

let count=0;

let interval=setInterval(()=>{

count++;

text.innerText=count+"%";

circle.style.background="conic-gradient(#38bdf8 "+count+"%,#1e293b 0%)";

if(count>=percent) clearInterval(interval);

},20);

});

/* AI CURSOR */

const cursor=document.querySelector(".cursor");

document.addEventListener("mousemove",e=>{
cursor.style.left=e.clientX+"px";
cursor.style.top=e.clientY+"px";
});

</script>
