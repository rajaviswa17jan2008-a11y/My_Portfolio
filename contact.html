
<!DOCTYPE html>

<head>

<title>Contact</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

<style>

/* PAGE STYLE */

body{
background:#020617;
color:white;
font-family:Arial;
}

/* SECTION */

.contact-container{
max-width:900px;
margin:auto;
padding:40px;
}

/* GLASS CARD */

.glass{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(10px);
border-radius:12px;
padding:40px;
border:1px solid rgba(255,255,255,0.2);
}

/* TITLE */

h2{
text-align:center;
margin-bottom:30px;
color:#38bdf8;
}

/* CONTACT INFO */

.contact-info{
display:flex;
justify-content:space-around;
margin-bottom:30px;
flex-wrap:wrap;
}

.contact-box{
text-align:center;
margin:10px;
}

.contact-box i{
font-size:25px;
color:#38bdf8;
margin-bottom:10px;
}

/* FORM */

form{
display:flex;
flex-direction:column;
gap:15px;
}

input,textarea{
padding:12px;
border:none;
border-radius:6px;
background:#1e293b;
color:white;
outline:none;
transition:0.3s;
}

input:focus,textarea:focus{
box-shadow:0 0 10px #38bdf8;
}

/* BUTTON */

.btn{
padding:12px;
background:#38bdf8;
border:none;
border-radius:6px;
cursor:pointer;
font-weight:bold;
transition:0.3s;
}

.btn:hover{
box-shadow:0 0 15px #38bdf8;
transform:scale(1.05);
}

/* SOCIAL */

.social{
text-align:center;
margin-top:30px;
}

.social a{
margin:0 10px;
font-size:24px;
color:#38bdf8;
transition:0.3s;
}

.social a:hover{
color:white;
transform:scale(1.3);
}
.whatsapp{
position:fixed;
bottom:25px;
right:25px;
background:#25D366;
color:white;
font-size:28px;
padding:15px;
border-radius:50%;
box-shadow:0 0 15px #25D366;
z-index:100;
transition:0.3s;
}

.whatsapp:hover{
transform:scale(1.2);
box-shadow:0 0 25px #25D366;
}

</style>

</head>
